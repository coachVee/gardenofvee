<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden of Vee | Breathe · Belong · Become</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js">
    </script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/framer-motion@10.16.4/dist/framer-motion.js">
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js">
    </script>
    <style>
        :root {
            --clay: #D16B3D;
            --clay-light: #e88a5e;
            --clay-dark: #a84d28;
            --sage: #717254;
            --sage-light: #8f906e;
            --sage-dark: #55563b;
            --warm-bg: #fcfbf9;
            --deep: #1a1a1a;
            --golden: #c9975b;
            --cream: #faf7f2;
            --olive: #5a5e3d;
            --terracotta: #b85c3a;
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--warm-bg);
            margin: 0;
            -webkit-font-smoothing: antialiased;
            scroll-behavior: smooth;
            cursor: default;
            overflow-x: hidden;
        }

        .font-display {
            font-family: 'Playfair Display', Georgia, serif;
        }

        ::selection {
            background-color: rgba(209, 107, 61, 0.25);
            color: var(--clay-dark);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .glass {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        .glass-dark {
            background: rgba(26, 26, 26, 0.55);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        @keyframes float {
            0%,
            100% {
                transform: translateY(0px) rotate(0deg);
            }
            25% {
                transform: translateY(-20px) rotate(1deg);
            }
            50% {
                transform: translateY(-8px) rotate(-1deg);
            }
            75% {
                transform: translateY(-28px) rotate(0.5deg);
            }
        }
        @keyframes float-slow {
            0%,
            100% {
                transform: translateY(0px) translateX(0px);
            }
            33% {
                transform: translateY(-30px) translateX(15px);
            }
            66% {
                transform: translateY(-10px) translateX(-10px);
            }
        }
        @keyframes pulse-glow {
            0%,
            100% {
                box-shadow: 0 0 30px rgba(209, 107, 61, 0.15), 0 0 60px rgba(209, 107, 61, 0.05);
            }
            50% {
                box-shadow: 0 0 50px rgba(209, 107, 61, 0.3), 0 0 100px rgba(209, 107, 61, 0.12);
            }
        }
        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }
            100% {
                background-position: 200% 0;
            }
        }
        @keyframes blob {
            0%,
            100% {
                border-radius: 60% 40% 30% 70%/60% 30% 70% 40%;
            }
            25% {
                border-radius: 30% 60% 70% 40%/50% 60% 30% 60%;
            }
            50% {
                border-radius: 50% 50% 40% 60%/40% 50% 60% 50%;
            }
            75% {
                border-radius: 40% 60% 50% 50%/60% 40% 50% 60%;
            }
        }

        .animate-float {
            animation: float 8s ease-in-out infinite;
        }
        .animate-float-slow {
            animation: float-slow 12s ease-in-out infinite;
        }
        .animate-blob {
            animation: blob 14s ease-in-out infinite;
        }
        .animate-shimmer {
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            background-size: 200% 100%;
            animation: shimmer 2.5s ease-in-out infinite;
        }

        .parallax-slow {
            will-change: transform;
        }
        .reveal-text {
            clip-path: polygon(0 0, 100% 0, 100% 0, 0 0);
            transition: clip-path 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .reveal-text.visible {
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
        }

        .card-hover-3d {
            transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.5s ease;
        }
        .card-hover-3d:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(209, 107, 61, 0.1);
        }

        .scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--clay), var(--golden), var(--sage));
            z-index: 100;
            transition: width 0.1s linear;
        }

        @media (max-width: 768px) {
            .animate-float,
            .animate-float-slow {
                animation-duration: 6s;
            }
        }
    </style>
</head>
<body class="selection-orange">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef, useMemo } = React;
        const { motion, AnimatePresence, useScroll, useTransform, useInView, useSpring } = Motion;

        // --- Utility Hooks ---
        const useScrollProgress = () => {
            const [progress, setProgress] = useState(0);
            useEffect(() => {
                const handleScroll = () => {
                    const total = document.documentElement.scrollHeight - window.innerHeight;
                    setProgress(total > 0 ? window.scrollY / total : 0);
                };
                window.addEventListener('scroll', handleScroll, { passive: true });
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);
            return progress;
        };

        const useParallax = (speed = 0.5) => {
            const ref = useRef(null);
            const [offset, setOffset] = useState(0);
            useEffect(() => {
                const handleScroll = () => {
                    if (ref.current) {
                        const rect = ref.current.getBoundingClientRect();
                        const scrolled = (window.innerHeight - rect.top) / (window.innerHeight + rect.height);
                        setOffset(scrolled * speed * 100);
                    }
                };
                window.addEventListener('scroll', handleScroll, { passive: true });
                return () => window.removeEventListener('scroll', handleScroll);
            }, [speed]);
            return { ref, offset };
        };

        // --- Scroll Progress Bar ---
        const ScrollProgressBar = () => {
            const progress = useScrollProgress();
            return <div className="scroll-progress" style={{ width: `${progress * 100}%` }} />;
        };

        // --- Animated Background Blob ---
        const BackgroundBlob = ({ color, size, position, delay = 0, opacity = 0.15 }) => (
            <motion.div
                initial={{ opacity: 0, scale: 0 }}
                animate={{ opacity, scale: 1 }}
                transition={{ duration: 1.5, delay, ease: "easeOut" }}
                className="absolute pointer-events-none animate-blob"
                style={{
                    width: size,
                    height: size,
                    background: `radial-gradient(circle at 40% 50%, ${color}, transparent)`,
                    ...position,
                    filter: 'blur(80px)',
                }}
            />
        );

        // --- Section Reveal ---
        const RevealSection = ({ children, className = "" }) => {
            const ref = useRef(null);
            const isInView = useInView(ref, { once: true, margin: "-100px" });
            return (
                <motion.div
                    ref={ref}
                    initial={{ opacity: 0, y: 60 }}
                    animate={isInView ? { opacity: 1, y: 0 } : { opacity: 0, y: 60 }}
                    transition={{ duration: 0.9, ease: [0.22, 1, 0.36, 1] }}
                    className={className}
                >
                    {children}
                </motion.div>
            );
        };

        // --- Stagger Children ---
        const StaggerContainer = ({ children, className = "", delay = 0 }) => {
            const ref = useRef(null);
            const isInView = useInView(ref, { once: true, margin: "-80px" });
            return (
                <motion.div
                    ref={ref}
                    initial="hidden"
                    animate={isInView ? "visible" : "hidden"}
                    variants={{
                        visible: { transition: { staggerChildren: 0.12, delayChildren: delay } },
                        hidden: {}
                    }}
                    className={className}
                >
                    {React.Children.map(children, child => (
                        <motion.div
                            variants={{
                                hidden: { opacity: 0, y: 40 },
                                visible: { opacity: 1, y: 0, transition: { duration: 0.7, ease: [0.22, 1, 0.36, 1] } }
                            }}
                        >
                            {child}
                        </motion.div>
                    ))}
                </motion.div>
            );
        };

        // --- Glow Button ---
        const GlowButton = ({ children, onClick, variant = 'dark', className = "" }) => (
            <motion.button
                onClick={onClick}
                whileHover={{ scale: 1.04 }}
                whileTap={{ scale: 0.96 }}
                className={`relative group px-8 py-3 rounded-full font-bold text-[10px] uppercase tracking-[0.3em] overflow-hidden transition-all duration-500 ${variant === 'dark' ? 'bg-black text-white hover:bg-[#D16B3D]' : 'bg-white text-black hover:bg-[#D16B3D] hover:text-white'} shadow-xl hover:shadow-2xl ${className}`}
            >
                <span className="relative z-10">{children}</span>
                <div className="absolute inset-0 bg-gradient-to-r from-[#D16B3D] via-[#c9975b] to-[#D16B3D] opacity-0 group-hover:opacity-100 transition-opacity duration-500" />
            </motion.button>
        );

        // --- Navigation ---
        const Nav = ({ currentPage, setCurrentPage }) => {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);
            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll, { passive: true });
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const links = [
                { name: "Home", id: "home" },
                { name: "Shared Moments", id: "shared-moments" },
                { name: "Retreats", id: "retreats" },
                { name: "Faith", id: "faith" },
                { name: "Team", id: "team" },
            ];

            const handleNavClick = (id) => {
                setCurrentPage(id);
                setIsMenuOpen(false);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            return (
                <motion.nav
                    initial={{ y: -100 }}
                    animate={{ y: 0 }}
                    transition={{ duration: 0.8, ease: "easeOut" }}
                    className={`fixed top-0 w-full z-50 transition-all duration-500 ${scrolled ? 'glass shadow-lg' : 'bg-white/80 backdrop-blur-md'}`}
                >
                    <div className="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                        <button onClick={() => handleNavClick('home')} className="flex items-center space-x-2 group">
                            <motion.img
                                whileHover={{ scale: 1.05 }}
                                src="https://gardenofvee.africa/_assets/media/e64d177df4a837090c086e43ad81e6f8.png"
                                alt="Logo"
                                className="h-10 md:h-12 w-auto"
                            />
                        </button>

                        <div className="hidden lg:flex items-center space-x-10 text-[11px] uppercase tracking-[0.2em] font-bold">
                            {links.map((link) => (
                                <button
                                    key={link.id}
                                    onClick={() => handleNavClick(link.id)}
                                    className={`relative transition-colors duration-300 ${currentPage === link.id ? 'text-[#D16B3D]' : 'text-gray-500 hover:text-[#D16B3D]'} group`}
                                >
                                    {link.name}
                                    <span className={`absolute -bottom-1 left-0 h-0.5 bg-[#D16B3D] transition-all duration-300 ${currentPage === link.id ? 'w-full' : 'w-0 group-hover:w-full'}`} />
                                </button>
                            ))}
                            <GlowButton onClick={() => {
                                setCurrentPage('home');
                                setTimeout(() => {
                                    const el = document.getElementById('contact');
                                    if (el) el.scrollIntoView({ behavior: 'smooth' });
                                }, 100);
                            }}>
                                Enquire
                            </GlowButton>
                        </div>

                        <button className="lg:hidden p-2 text-gray-600 relative z-50" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                            <div className="w-6 h-5 relative flex flex-col justify-between">
                                <span className={`w-full h-0.5 bg-current transition-all duration-300 ${isMenuOpen ? 'rotate-45 translate-y-2' : ''}`} />
                                <span className={`w-full h-0.5 bg-current transition-all duration-300 ${isMenuOpen ? 'opacity-0' : ''}`} />
                                <span className={`w-full h-0.5 bg-current transition-all duration-300 ${isMenuOpen ? '-rotate-45 -translate-y-2' : ''}`} />
                            </div>
                        </button>
                    </div>

                    <AnimatePresence>
                        {isMenuOpen && (
                            <motion.div
                                initial={{ opacity: 0, height: 0 }}
                                animate={{ opacity: 1, height: 'auto' }}
                                exit={{ opacity: 0, height: 0 }}
                                transition={{ duration: 0.4, ease: "easeInOut" }}
                                className="lg:hidden glass overflow-hidden"
                            >
                                <div className="flex flex-col p-8 space-y-6 text-center uppercase tracking-widest text-sm font-bold">
                                    {links.map((link) => (
                                        <button key={link.id} onClick={() => handleNavClick(link.id)} className={currentPage === link.id ? 'text-[#D16B3D]' : 'text-gray-500'}>
                                            {link.name}
                                        </button>
                                    ))}
                                    <button
                                        onClick={() => { setCurrentPage('home'); setIsMenuOpen(false); setTimeout(() => { const el = document.getElementById('contact'); if (el) el.scrollIntoView({ behavior: 'smooth' }); }, 100); }}
                                        className="bg-black text-white px-8 py-4 rounded-full"
                                    >
                                        Enquire
                                    </button>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </motion.nav>
            );
        };

        // --- Footer ---
        const Footer = ({ setCurrentPage }) => (
            <footer className="relative py-32 bg-[#1a1a1a] text-white overflow-hidden">
                <BackgroundBlob color="#D16B3D" size="500px" position={{ top: '-200px', right: '-150px' }} opacity={0.08} delay={0} />
                <BackgroundBlob color="#717254" size="400px" position={{ bottom: '-150px', left: '-100px' }} opacity={0.06} delay={0.5} />
                <div className="max-w-7xl mx-auto px-6 relative z-10">
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-16 text-center md:text-left">
                        <div className="md:col-span-2">
                            <motion.img
                                initial={{ opacity: 0, x: -30 }}
                                whileInView={{ opacity: 1, x: 0 }}
                                viewport={{ once: true }}
                                src="https://gardenofvee.africa/_assets/media/e64d177df4a837090c086e43ad81e6f8.png"
                                alt="Logo"
                                className="h-20 w-auto mb-8 mx-auto md:mx-0 brightness-0 invert opacity-80"
                            />
                            <p className="text-gray-400 text-base font-light leading-relaxed max-w-md mx-auto md:mx-0">
                                Creating spaces for shared presence, creative expression, and spiritual reflection. Breathe, belong, and become with us.
                            </p>
                        </div>
                        <div>
                            <h4 className="text-[11px] uppercase tracking-[0.4em] font-black mb-8 text-[#D16B3D]">Connect</h4>
                            <ul className="space-y-5 text-[11px] uppercase tracking-[0.2em] font-bold text-gray-400">
                                <li><a href="mailto:hello@gardenofvee.africa" className="hover:text-[#D16B3D] transition-colors duration-300">Email Us</a></li>
                                <li><a href="https://instagram.com/gardenofvee" target="_blank" className="hover:text-[#D16B3D] transition-colors duration-300">Instagram</a></li>
                                <li><a href="https://facebook.com/gardenofvee" target="_blank" className="hover:text-[#D16B3D] transition-colors duration-300">Facebook</a></li>
                            </ul>
                        </div>
                    </div>
                    <div className="mt-24 pt-12 border-t border-white/10 flex flex-col md:flex-row justify-between items-center space-y-6 md:space-y-0 text-[11px] text-gray-500 uppercase tracking-[0.3em] font-bold">
                        <div>© {new Date().getFullYear()} Garden of Vee. All rights reserved.</div>
                        <button onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })} className="hover:text-[#D16B3D] flex items-center space-x-4 group transition-colors duration-300">
                            <span>Back to Top</span>
                            <div className="w-10 h-10 rounded-full border border-white/20 flex items-center justify-center group-hover:border-[#D16B3D] group-hover:bg-[#D16B3D] group-hover:text-white transition-all duration-300">
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 10l7-7m0 0l7 7m-7-7v18" /></svg>
                            </div>
                        </button>
                    </div>
                </div>
            </footer>
        );

        // --- Home Page ---
        const HomePage = ({ setCurrentPage }) => {
            const heroRef = useRef(null);
            const { scrollY } = useScroll();
            const heroOpacity = useTransform(scrollY, [0, 500], [1, 0.3]);
            const heroScale = useTransform(scrollY, [0, 500], [1, 1.08]);

            return (
                <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}>
                    {/* Hero Section */}
                    <section ref={heroRef} className="relative h-screen w-full overflow-hidden bg-black flex items-center justify-center">
                        <motion.video
                            style={{ scale: heroScale }}
                            className="absolute inset-0 h-full w-full object-cover opacity-60"
                            autoPlay muted loop playsInline
                            src="https://gardenofvee.africa/_assets/video/a7622746c5c90fc291f10343794ab1f1.mp4"
                        />
                        <div className="absolute inset-0 bg-gradient-to-b from-black/60 via-black/30 to-black/70" />

                        {/* Floating orbs */}
                        <div className="absolute inset-0 overflow-hidden pointer-events-none">
                            <div className="absolute top-1/4 left-1/4 w-64 h-64 rounded-full bg-[#D16B3D]/10 blur-3xl animate-float-slow" />
                            <div className="absolute bottom-1/3 right-1/4 w-80 h-80 rounded-full bg-[#717254]/10 blur-3xl animate-float" style={{ animationDelay: '-4s' }} />
                            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 rounded-full bg-[#c9975b]/5 blur-3xl animate-float" style={{ animationDelay: '-8s' }} />
                        </div>

                        <motion.div style={{ opacity: heroOpacity }} className="relative z-10 flex flex-col items-center text-center px-6">
                            <motion.img
                                initial={{ opacity: 0, scale: 0.9, y: 30 }}
                                animate={{ opacity: 1, scale: 1, y: 0 }}
                                transition={{ duration: 1.2, ease: "easeOut" }}
                                src="https://gardenofvee.africa/_assets/media/e64d177df4a837090c086e43ad81e6f8.png"
                                className="w-56 md:w-72 lg:w-88 mb-8 drop-shadow-2xl"
                            />
                            <motion.div
                                initial={{ opacity: 0, y: 25 }}
                                animate={{ opacity: 1, y: 0 }}
                                transition={{ delay: 0.5, duration: 1, ease: "easeOut" }}
                                className="overflow-hidden"
                            >
                                <h1 className="text-white text-sm md:text-xl lg:text-2xl font-light tracking-[0.35em] mb-10 uppercase">
                                    Breathe <span className="text-[#D16B3D] mx-2">·</span> Belong <span className="text-[#D16B3D] mx-2">·</span> Become
                                </h1>
                            </motion.div>
                            <motion.div
                                initial={{ opacity: 0, y: 20 }}
                                animate={{ opacity: 1, y: 0 }}
                                transition={{ delay: 0.9, duration: 0.8 }}
                                className="flex flex-col items-center space-y-8"
                            >
                                <a href="#experiences" className="group relative px-8 py-4 overflow-hidden rounded-full border border-white/30 text-white text-[10px] uppercase tracking-[0.3em] font-bold transition-all duration-500 hover:border-[#D16B3D] shadow-2xl hover:shadow-[#D16B3D]/20">
                                    <span className="relative z-10 group-hover:text-white transition-colors duration-500">Explore our experiences</span>
                                    <div className="absolute inset-0 bg-gradient-to-r from-[#D16B3D] to-[#c9975b] translate-y-full group-hover:translate-y-0 transition-transform duration-500 ease-out" />
                                </a>
                                <button onClick={() => {
                                    const el = document.getElementById('gatherings-section');
                                    if (el) el.scrollIntoView({ behavior: 'smooth' });
                                }} className="text-white/60 hover:text-white text-[10px] uppercase tracking-[0.3em] font-bold transition-all flex flex-col items-center group">
                                    <span className="mb-3">Upcoming Gatherings</span>
                                    <div className="w-12 h-px bg-white/20 group-hover:w-24 group-hover:bg-[#D16B3D] transition-all duration-700" />
                                </button>
                            </motion.div>
                        </motion.div>

                        {/* Scroll indicator */}
                        <motion.div
                            initial={{ opacity: 0 }}
                            animate={{ opacity: 1 }}
                            transition={{ delay: 1.8 }}
                            className="absolute bottom-8 left-1/2 -translate-x-1/2 flex flex-col items-center text-white/25"
                        >
                            <span className="text-[9px] uppercase tracking-[0.4em] mb-3">Scroll</span>
                            <div className="w-px h-16 bg-gradient-to-b from-white/40 to-transparent animate-pulse" />
                        </motion.div>
                    </section>

                    {/* Experiences Section */}
                    <section id="experiences" className="relative py-40 px-6 bg-[#fcfbf9] overflow-hidden">
                        <BackgroundBlob color="#D16B3D" size="600px" position={{ top: '-100px', left: '-200px' }} opacity={0.06} />
                        <BackgroundBlob color="#717254" size="500px" position={{ bottom: '-100px', right: '-150px' }} opacity={0.05} delay={0.6} />

                        <RevealSection className="max-w-5xl mx-auto text-center mb-28">
                            <span className="text-[11px] uppercase tracking-[0.6em] font-black text-[#D16B3D] mb-8 block">Our Offerings</span>
                            <h2 className="font-display text-5xl md:text-6xl lg:text-7xl font-medium mb-10 text-gray-800 tracking-tight leading-tight">
                                Ways to Enter <br className="md:hidden" />
                                <span className="text-[#D16B3D] italic">Garden of Vee</span>
                            </h2>
                            <p className="text-xl text-gray-400 max-w-2xl mx-auto font-light leading-relaxed">
                                Whether you come solo, with others, or with your organisation, we host experiences that meet you there.
                            </p>
                        </RevealSection>

                        <StaggerContainer className="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-6xl mx-auto">
                            {[
                                { id: 'shared-moments', title: 'Shared Moment Events', video: './moments.mp4', desc: 'Join us for creative, social and community events.', accent: '#D16B3D' },
                                { id: 'retreats', title: 'Retreats', video: './retreats.mp4', desc: 'Time set aside to pause — alone or together.', accent: '#717254' },
                                { id: 'faith', title: 'Faith and Reflection', img: 'https://gardenofvee.africa/_assets/media/44e1e577ff23f203d5b4d430ab741edf.png', desc: 'Christian-rooted spaces for prayer and reflection.',
                                    accent: '#c9975b' },
                                { id: 'team', title: 'Team and Culture', img: 'https://gardenofvee.africa/_assets/media/593e96822a2ae8545d2ecfcce8bac7eb.png', desc: 'Facilitated experiences for leadership development.',

                    </RevealSection>
                </div>
            </motion.section>
        );

        // --- Main App ---
        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');

            const renderPage = () => {
                switch (currentPage) {
                    case 'shared-moments':
                        return <SharedMomentsPage key="shared-moments" setCurrentPage={setCurrentPage} />;
                    case 'retreats':
                        return <RetreatsPage key="retreats" setCurrentPage={setCurrentPage} />;
                    case 'faith':
                        return <FaithPage key="faith" setCurrentPage={setCurrentPage} />;
                    case 'team':
                        return <TeamPage key="team" setCurrentPage={setCurrentPage} />;
                    case 'gatherings':
                        return <GatheringsPage key="gatherings" setCurrentPage={setCurrentPage} />;
                    default:
                        return <HomePage key="home" setCurrentPage={setCurrentPage} />;
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <ScrollProgressBar />
                    <Nav currentPage={currentPage} setCurrentPage={setCurrentPage} />
                    <main className="flex-grow pt-20">
                        <AnimatePresence mode="wait">
                            <motion.div
                                key={currentPage}
                                initial={{ opacity: 0, y: 20 }}
                                animate={{ opacity: 1, y: 0 }}
                                exit={{ opacity: 0, y: -20 }}
                                transition={{ duration: 0.5, ease: "easeInOut" }}
                            >
                                {renderPage()}
                            </motion.div>
                        </AnimatePresence>
                    </main>
                    <Footer setCurrentPage={setCurrentPage} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
